kind = "web"
previewPath = "/"
title = "LuxEx Executive Ride"
version = "1.0.0"
id = "artifacts/luxex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23203

[services.development]
run = "pnpm --filter @workspace/luxex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/luxex", "run", "build" ]
publicDir = "artifacts/luxex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23203"
BASE_PATH = "/"
